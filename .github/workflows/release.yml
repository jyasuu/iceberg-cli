name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"      # v1.2.3-rc.1

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINARY_NAME: iceberg-cli

jobs:
  # ── Sanity-check: version in Cargo.toml must match the git tag ────────────
  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Cargo.toml version matches tag
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          SEMVER="${TAG#v}"                 # e.g. 1.2.3
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Git tag   : $TAG"
          echo "Cargo.toml: $CARGO_VERSION"
          if [ "$CARGO_VERSION" != "$SEMVER" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($SEMVER)"
            exit 1
          fi

  # ── Cross-compile release binaries ────────────────────────────────────────
  build-release:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64 (glibc) — primary target
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: iceberg-cli-linux-amd64

          # Linux ARM64 — cloud / Raspberry Pi
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: iceberg-cli-linux-arm64
            cross: true

          # macOS x86-64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: iceberg-cli-macos-amd64

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: iceberg-cli-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64 Linux)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare asset
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${BINARY_NAME}"
          cp "$SRC" "${{ matrix.asset_name }}"
          # Checksum
          sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git log changelog

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List dist contents
        run: ls -lh dist/

      - name: Generate changelog from git log
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG"           >> "$GITHUB_OUTPUT"
          echo "EOF"            >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "iceberg-cli ${{ github.ref_name }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Installation

            Download the binary for your platform below, verify the SHA-256 checksum, and place it on your `PATH`.

            ```bash
            # Example — Linux x86-64
            curl -Lo iceberg-cli \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/iceberg-cli-linux-amd64
            chmod +x iceberg-cli
            ```

            ## Platforms

            | Binary | OS | Arch |
            |--------|----|------|
            | `iceberg-cli-linux-amd64`  | Linux  | x86-64       |
            | `iceberg-cli-linux-arm64`  | Linux  | ARM64        |
            | `iceberg-cli-macos-amd64`  | macOS  | Intel        |
            | `iceberg-cli-macos-arm64`  | macOS  | Apple Silicon |

          draft: false
          # Mark as pre-release if tag contains a hyphen (e.g. v1.0.0-rc.1)
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/**
